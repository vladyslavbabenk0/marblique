<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Marblique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #020202;
      --white: #fdfdfd;
      --gray: #7e7e7e;
      --border: #606266;
      --light: #d9d9d9;
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      position: relative;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      text-decoration: none;
      color: var(--black);
    }

    .nav-brand img { width: 22px; height: 22px; }

    .nav-links {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 44px;
      list-style: none;
    }

    .nav-links a {
      font-size: 16px;
      font-weight: 300;
      text-decoration: none;
      color: var(--black);
    }

    .nav-links a.active { text-decoration: underline; }

    .nav-signin {
      margin-left: auto;
      font-size: 16px;
      font-weight: 300;
      cursor: pointer;
    }

    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      margin-left: auto;
    }

    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--black);
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-signin { display: none; }
      .nav-hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html">
      <img src="https://www.figma.com/api/mcp/asset/7ae70740-1e93-4a65-bbb3-3e7c3a0f9a7d" alt="" />
      <span>Marblique</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html" class="active">Products</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <span class="nav-signin">Sign In</span>
    <button class="nav-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

</body>
</html>
